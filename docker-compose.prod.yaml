services:
  ingress:
    ports:
      - "${ARCHIVIST_PUBLIC_PORT:?ARCHIVIST_PUBLIC_PORT must be set}:65000"

  gateway:
    image: ${ARCHIVIST_GATEWAY_IMAGE:?ARCHIVIST_GATEWAY_IMAGE must be set}
    environment:
      ARCHIVIST_SQLITE_PATH: ${ARCHIVIST_SQLITE_PATH:?ARCHIVIST_SQLITE_PATH must be set}
      ARCHIVIST_DATA_DIR: ${ARCHIVIST_DATA_DIR:?ARCHIVIST_DATA_DIR must be set}
      ARCHIVIST_GATEWAY_PUBLIC_HOSTS: ${ARCHIVIST_GATEWAY_PUBLIC_HOSTS:?ARCHIVIST_GATEWAY_PUBLIC_HOSTS must be set}
      ARCHIVIST_Telegram__BotToken: ${ARCHIVIST_Telegram__BotToken:?ARCHIVIST_Telegram__BotToken must be set}
      ARCHIVIST_Telegram__WebhookSecret: ${ARCHIVIST_Telegram__WebhookSecret:?ARCHIVIST_Telegram__WebhookSecret must be set}
      ARCHIVIST_AUTH_BOOTSTRAP_PASSWORD: ${ARCHIVIST_AUTH_BOOTSTRAP_PASSWORD?ARCHIVIST_AUTH_BOOTSTRAP_PASSWORD must be set; may be empty after bootstrap}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:?OTEL_EXPORTER_OTLP_ENDPOINT must be set}

  worker:
    image: ${ARCHIVIST_WORKER_IMAGE:?ARCHIVIST_WORKER_IMAGE must be set}
    environment:
      ARCHIVIST_SQLITE_PATH: ${ARCHIVIST_SQLITE_PATH:?ARCHIVIST_SQLITE_PATH must be set}
      ARCHIVIST_DATA_DIR: ${ARCHIVIST_DATA_DIR:?ARCHIVIST_DATA_DIR must be set}
      ARCHIVIST_JINA_API_KEY: ${ARCHIVIST_JINA_API_KEY:?ARCHIVIST_JINA_API_KEY must be set}
      ARCHIVIST_LLM_PROVIDER: ${ARCHIVIST_LLM_PROVIDER:?ARCHIVIST_LLM_PROVIDER must be set}
      ARCHIVIST_LLM_API_KEY: ${ARCHIVIST_LLM_API_KEY:?ARCHIVIST_LLM_API_KEY must be set}
      ARCHIVIST_LLM_MODEL: ${ARCHIVIST_LLM_MODEL:?ARCHIVIST_LLM_MODEL must be set}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:?OTEL_EXPORTER_OTLP_ENDPOINT must be set}

  snapshotter:
    image: ${ARCHIVIST_SNAPSHOTTER_IMAGE:?ARCHIVIST_SNAPSHOTTER_IMAGE must be set}
    environment:
      ARCHIVIST_DATA_DIR: ${ARCHIVIST_DATA_DIR:?ARCHIVIST_DATA_DIR must be set}
      ARCHIVIST_SQLITE_PATH: ${ARCHIVIST_SQLITE_PATH:?ARCHIVIST_SQLITE_PATH must be set}
      ARCHIVIST_SNAPSHOTTER_INTERVAL_SECONDS: ${ARCHIVIST_SNAPSHOTTER_INTERVAL_SECONDS:?ARCHIVIST_SNAPSHOTTER_INTERVAL_SECONDS must be set}
      ARCHIVIST_SNAPSHOTTER_WORK_DIR: ${ARCHIVIST_SNAPSHOTTER_WORK_DIR:?ARCHIVIST_SNAPSHOTTER_WORK_DIR must be set}
      ARCHIVIST_SNAPSHOTTER_S3_ENDPOINT_URL: ${ARCHIVIST_SNAPSHOTTER_S3_ENDPOINT_URL:?ARCHIVIST_SNAPSHOTTER_S3_ENDPOINT_URL must be set}
      ARCHIVIST_SNAPSHOTTER_S3_REGION: ${ARCHIVIST_SNAPSHOTTER_S3_REGION:?ARCHIVIST_SNAPSHOTTER_S3_REGION must be set}
      ARCHIVIST_SNAPSHOTTER_S3_BUCKET: ${ARCHIVIST_SNAPSHOTTER_S3_BUCKET:?ARCHIVIST_SNAPSHOTTER_S3_BUCKET must be set}
      ARCHIVIST_SNAPSHOTTER_S3_ACCESS_KEY_ID: ${ARCHIVIST_SNAPSHOTTER_S3_ACCESS_KEY_ID:?ARCHIVIST_SNAPSHOTTER_S3_ACCESS_KEY_ID must be set}
      ARCHIVIST_SNAPSHOTTER_S3_SECRET_ACCESS_KEY: ${ARCHIVIST_SNAPSHOTTER_S3_SECRET_ACCESS_KEY:?ARCHIVIST_SNAPSHOTTER_S3_SECRET_ACCESS_KEY must be set}
      ARCHIVIST_SNAPSHOTTER_OBJECT_PREFIX: ${ARCHIVIST_SNAPSHOTTER_OBJECT_PREFIX?ARCHIVIST_SNAPSHOTTER_OBJECT_PREFIX must be set; may be empty}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:?OTEL_EXPORTER_OTLP_ENDPOINT must be set}

  ui:
    image: ${ARCHIVIST_UI_IMAGE:?ARCHIVIST_UI_IMAGE must be set}

  otelcol:
    image: ${ARCHIVIST_OTEL_COLLECTOR_IMAGE:?ARCHIVIST_OTEL_COLLECTOR_IMAGE must be set}
    environment:
      ARCHIVIST_OTEL_EXPORTER_OTLP_ENDPOINT: ${ARCHIVIST_OTEL_EXPORTER_OTLP_ENDPOINT:?ARCHIVIST_OTEL_EXPORTER_OTLP_ENDPOINT must be set}
      ARCHIVIST_OTEL_EXPORTER_OTLP_AUTHORIZATION: ${ARCHIVIST_OTEL_EXPORTER_OTLP_AUTHORIZATION?ARCHIVIST_OTEL_EXPORTER_OTLP_AUTHORIZATION must be set; may be empty}
      ARCHIVIST_OTEL_TAIL_SAMPLING_PERCENTAGE: ${ARCHIVIST_OTEL_TAIL_SAMPLING_PERCENTAGE:?ARCHIVIST_OTEL_TAIL_SAMPLING_PERCENTAGE must be set}
      ARCHIVIST_OTEL_TAIL_SAMPLING_DECISION_WAIT: ${ARCHIVIST_OTEL_TAIL_SAMPLING_DECISION_WAIT:?ARCHIVIST_OTEL_TAIL_SAMPLING_DECISION_WAIT must be set}
