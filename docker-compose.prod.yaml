services:
  ingress:
    image: caddy:2.11.2
    depends_on:
      - gateway
      - ui
    ports:
      - "${ARCHIVIST_PUBLIC_PORT:-65000}:65000"
    volumes:
      - ./rp.Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - archivist
    restart: always

  gateway:
    image: ${ARCHIVIST_GATEWAY_IMAGE:?ARCHIVIST_GATEWAY_IMAGE must be set}
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DOTNET_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_ENVIRONMENT: Production
      ARCHIVIST_SQLITE_PATH: ${ARCHIVIST_SQLITE_PATH:-/data/archive.db}
      ARCHIVIST_DATA_DIR: ${ARCHIVIST_DATA_DIR:-/data}
      ARCHIVIST_GATEWAY_PUBLIC_HOSTS: ${ARCHIVIST_GATEWAY_PUBLIC_HOSTS:?ARCHIVIST_GATEWAY_PUBLIC_HOSTS must be set}
      ARCHIVIST_Telegram__BotToken: ${ARCHIVIST_Telegram__BotToken:?ARCHIVIST_Telegram__BotToken must be set}
      ARCHIVIST_Telegram__AllowedUserId: ${ARCHIVIST_Telegram__AllowedUserId:?ARCHIVIST_Telegram__AllowedUserId must be set}
      ARCHIVIST_Telegram__WebhookSecret: ${ARCHIVIST_Telegram__WebhookSecret:?ARCHIVIST_Telegram__WebhookSecret must be set}
      ARCHIVIST_AUTH_BOOTSTRAP_PASSWORD: ${ARCHIVIST_AUTH_BOOTSTRAP_PASSWORD:-}
      OTEL_SERVICE_NAME: archivist-gateway
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=archivist
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otelcol:4318}
      OTEL_TRACES_SAMPLER: always_on
    expose:
      - "8080"
    volumes:
      - data:/data
    networks:
      - archivist
    restart: always

  worker:
    image: ${ARCHIVIST_WORKER_IMAGE:?ARCHIVIST_WORKER_IMAGE must be set}
    depends_on:
      - gateway
    environment:
      ARCHIVIST_SQLITE_PATH: ${ARCHIVIST_SQLITE_PATH:-/data/archive.db}
      ARCHIVIST_DATA_DIR: ${ARCHIVIST_DATA_DIR:-/data}
      ARCHIVIST_JINA_API_KEY: ${ARCHIVIST_JINA_API_KEY:?ARCHIVIST_JINA_API_KEY must be set}
      ARCHIVIST_LLM_PROVIDER: ${ARCHIVIST_LLM_PROVIDER:-anthropic}
      ARCHIVIST_LLM_API_KEY: ${ARCHIVIST_LLM_API_KEY:?ARCHIVIST_LLM_API_KEY must be set}
      ARCHIVIST_LLM_MODEL: ${ARCHIVIST_LLM_MODEL:-claude-haiku-4-5-20251001}
      OTEL_SERVICE_NAME: archivist-worker
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=archivist
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otelcol:4318}
      OTEL_TRACES_SAMPLER: always_on
    volumes:
      - data:/data
    networks:
      - archivist
    restart: always

  snapshotter:
    image: ${ARCHIVIST_SNAPSHOTTER_IMAGE:?ARCHIVIST_SNAPSHOTTER_IMAGE must be set}
    depends_on:
      - gateway
      - worker
    environment:
      ARCHIVIST_DATA_DIR: ${ARCHIVIST_DATA_DIR:-/data}
      ARCHIVIST_SQLITE_PATH: ${ARCHIVIST_SQLITE_PATH:-/data/archive.db}
      ARCHIVIST_SNAPSHOTTER_INTERVAL_SECONDS: ${ARCHIVIST_SNAPSHOTTER_INTERVAL_SECONDS:-86400}
      ARCHIVIST_SNAPSHOTTER_WORK_DIR: ${ARCHIVIST_SNAPSHOTTER_WORK_DIR:-/work/archivist-snapshotter}
      ARCHIVIST_SNAPSHOTTER_S3_ENDPOINT_URL: ${ARCHIVIST_SNAPSHOTTER_S3_ENDPOINT_URL:?ARCHIVIST_SNAPSHOTTER_S3_ENDPOINT_URL must be set}
      ARCHIVIST_SNAPSHOTTER_S3_REGION: ${ARCHIVIST_SNAPSHOTTER_S3_REGION:?ARCHIVIST_SNAPSHOTTER_S3_REGION must be set}
      ARCHIVIST_SNAPSHOTTER_S3_BUCKET: ${ARCHIVIST_SNAPSHOTTER_S3_BUCKET:?ARCHIVIST_SNAPSHOTTER_S3_BUCKET must be set}
      ARCHIVIST_SNAPSHOTTER_S3_ACCESS_KEY_ID: ${ARCHIVIST_SNAPSHOTTER_S3_ACCESS_KEY_ID:?ARCHIVIST_SNAPSHOTTER_S3_ACCESS_KEY_ID must be set}
      ARCHIVIST_SNAPSHOTTER_S3_SECRET_ACCESS_KEY: ${ARCHIVIST_SNAPSHOTTER_S3_SECRET_ACCESS_KEY:?ARCHIVIST_SNAPSHOTTER_S3_SECRET_ACCESS_KEY must be set}
      ARCHIVIST_SNAPSHOTTER_OBJECT_PREFIX: ${ARCHIVIST_SNAPSHOTTER_OBJECT_PREFIX:-}
      OTEL_SERVICE_NAME: archivist-snapshotter
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=archivist
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otelcol:4318}
      OTEL_TRACES_SAMPLER: always_on
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - data:/data
      - snapshotter-work:/work
    networks:
      - archivist
    restart: always

  ui:
    image: ${ARCHIVIST_UI_IMAGE:?ARCHIVIST_UI_IMAGE must be set}
    expose:
      - "8080"
    networks:
      - archivist
    restart: always

  otelcol:
    image: ${ARCHIVIST_OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.150.0}
    command:
      - --config=/etc/otelcol-config.yaml
    environment:
      ARCHIVIST_OTEL_EXPORTER_OTLP_ENDPOINT: ${ARCHIVIST_OTEL_EXPORTER_OTLP_ENDPOINT:?ARCHIVIST_OTEL_EXPORTER_OTLP_ENDPOINT must be set}
      ARCHIVIST_OTEL_EXPORTER_OTLP_AUTHORIZATION: ${ARCHIVIST_OTEL_EXPORTER_OTLP_AUTHORIZATION:-}
      ARCHIVIST_OTEL_TAIL_SAMPLING_PERCENTAGE: ${ARCHIVIST_OTEL_TAIL_SAMPLING_PERCENTAGE:-10}
      ARCHIVIST_OTEL_TAIL_SAMPLING_DECISION_WAIT: ${ARCHIVIST_OTEL_TAIL_SAMPLING_DECISION_WAIT:-10s}
    expose:
      - "4318"
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol-config.yaml:ro
    networks:
      - archivist
    restart: always

networks:
  archivist:

volumes:
  data:
  snapshotter-work:
