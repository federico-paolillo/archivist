lint:
  parallel: true
  commands:
    golangci:
      root: "src/worker/"
      run: go tool golangci-lint run
    biome:
      root: "src/ui/"
      run: npm run lint
    dotnet:
      root: "src/gateway/"
      run: dotnet build
    snapshotter-format:
      root: "src/snapshotter/"
      run: uv run ruff format --check .
    snapshotter-ruff:
      root: "src/snapshotter/"
      run: uv run ruff check .
    snapshotter-ty:
      root: "src/snapshotter/"
      run: uv run ty check .

test:
  parallel: true
  commands:
    gotest:
      root: "src/worker/"
      run: go test -race -shuffle=on ./...
    vitest:
      root: "src/ui/"
      run: npm run test
    dotnet:
      root: "src/gateway/"
      run: dotnet test
    snapshotter:
      root: "src/snapshotter/"
      run: uv run pytest

format:
  parallel: true
  commands:
    golangci:
      root: "src/worker/"
      run: go tool golangci-lint run --fix
    biome:
      root: "src/ui/"
      run: npm run format
    dotnet:
      root: "src/gateway/"
      run: dotnet format
    snapshotter:
      root: "src/snapshotter/"
      run: uv run ruff format .

cover:
  commands:
    gotest:
      root: "src/worker/"
      run: go test -shuffle=on -race -coverprofile=coverage.txt -covermode=atomic
        ./...

build:
  parallel: true
  commands:
    gobuild:
      root: "src/worker/"
      run: go build -v ./...
    npm:
      root: "src/ui/"
      run: npm run build
    dotnet:
      root: "src/gateway/"
      run: dotnet build
    snapshotter:
      root: "src/snapshotter/"
      run: uv sync --locked --all-extras --dev

pre-push:
  commands:
    test:
      glob:
        - "*.go"
        - "*.ts"
        - "*.tsx"
        - "*.cs"
        - "*.py"
        - "pyproject.toml"
        - "uv.lock"
      run: go tool lefthook run test

pre-commit:
  commands:
    lint:
      glob:
        - "*.go"
        - "*.ts"
        - "*.tsx"
        - "*.cs"
        - "*.py"
        - "pyproject.toml"
        - "uv.lock"
      run: go tool lefthook run lint
