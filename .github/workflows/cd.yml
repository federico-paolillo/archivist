name: CD

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, used as git tag and Docker image tag.
        required: true
        type: string
      target_ref:
        description: Git ref to release.
        required: false
        default: main
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  GATEWAY_IMAGE_NAME: archivist-gateway
  WORKER_IMAGE_NAME: archivist-worker
  UI_IMAGE_NAME: archivist-ui
  SNAPSHOTTER_IMAGE_NAME: archivist-snapshotter

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Resolve release commit
        id: release-ref
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          global-json-file: src/gateway/global.json

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: src/worker/go.mod
          cache-dependency-path: src/worker/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: src/snapshotter/uv.lock

      - name: Restore UI dependencies
        working-directory: src/ui
        run: npm ci

      - name: Format Gateway
        working-directory: src/gateway
        run: dotnet format --verify-no-changes

      - name: Build Gateway
        working-directory: src/gateway
        run: dotnet build

      - name: Test Gateway
        working-directory: src/gateway
        run: dotnet test

      - name: Lint Worker
        working-directory: src/worker
        run: go tool golangci-lint run

      - name: Build Worker
        working-directory: src/worker
        run: go build -v ./...

      - name: Test Worker
        working-directory: src/worker
        run: go test -race -shuffle=on ./...

      - name: Lint UI
        working-directory: src/ui
        run: npm run lint

      - name: Build UI
        working-directory: src/ui
        run: npm run build

      - name: Test UI
        working-directory: src/ui
        run: npm run test

      - name: Sync Snapshotter dependencies
        working-directory: src/snapshotter
        run: uv sync --locked --all-extras --dev

      - name: Format Snapshotter
        working-directory: src/snapshotter
        run: uv run ruff format --check .

      - name: Lint Snapshotter
        working-directory: src/snapshotter
        run: uv run ruff check .

      - name: Type-check Snapshotter
        working-directory: src/snapshotter
        run: uv run ty check .

      - name: Test Snapshotter
        working-directory: src/snapshotter
        run: uv run pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Snapshotter image for smoke test
        run: >-
          docker buildx build
          --file snapshotter.Dockerfile
          --platform linux/amd64
          --load
          --tag archivist-snapshotter:release-smoke
          .

      - name: Smoke Snapshotter image
        run: >-
          docker run
          --rm
          --read-only
          --tmpfs /tmp
          --entrypoint /app/venv/bin/archivist-snapshotter
          archivist-snapshotter:release-smoke
          --help

      - name: Build and push Gateway image
        id: build-gateway
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: gateway.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.GATEWAY_IMAGE_NAME }}:${{ inputs.version }}

      - name: Attest Gateway image
        id: attest-gateway
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.GATEWAY_IMAGE_NAME }}
          subject-digest: ${{ steps.build-gateway.outputs.digest }}
          push-to-registry: true

      - name: Build and push Worker image
        id: build-worker
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: worker.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.WORKER_IMAGE_NAME }}:${{ inputs.version }}

      - name: Attest Worker image
        id: attest-worker
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.WORKER_IMAGE_NAME }}
          subject-digest: ${{ steps.build-worker.outputs.digest }}
          push-to-registry: true

      - name: Build and push UI image
        id: build-ui
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ui.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION_LABEL=${{ steps.release-ref.outputs.sha }}
            VITE_API_BASE_PATH=/api
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.UI_IMAGE_NAME }}:${{ inputs.version }}

      - name: Attest UI image
        id: attest-ui
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.UI_IMAGE_NAME }}
          subject-digest: ${{ steps.build-ui.outputs.digest }}
          push-to-registry: true

      - name: Build and push Snapshotter image
        id: build-snapshotter
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: snapshotter.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.SNAPSHOTTER_IMAGE_NAME }}:${{ inputs.version }}

      - name: Attest Snapshotter image
        id: attest-snapshotter
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.SNAPSHOTTER_IMAGE_NAME }}
          subject-digest: ${{ steps.build-snapshotter.outputs.digest }}
          push-to-registry: true

      - name: Package production Compose files
        run: >-
          scripts/package-compose-release.sh
          "${{ inputs.version }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.GATEWAY_IMAGE_NAME }}@${{ steps.build-gateway.outputs.digest }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.WORKER_IMAGE_NAME }}@${{ steps.build-worker.outputs.digest }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.UI_IMAGE_NAME }}@${{ steps.build-ui.outputs.digest }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.SNAPSHOTTER_IMAGE_NAME }}@${{ steps.build-snapshotter.outputs.digest }}"

      - name: Validate production Compose config
        run: >-
          docker compose
          --env-file release/compose/.env
          --env-file release/compose/.env.images
          -f release/compose/docker-compose.yml
          config --quiet

      - name: Show production Compose images
        run: >-
          docker compose
          --env-file release/compose/.env
          --env-file release/compose/.env.images
          -f release/compose/docker-compose.yml
          config --images

      - name: Upload production Compose workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: archivist-compose-${{ inputs.version }}
          path: release/archivist-compose-${{ inputs.version }}.tar.gz
          if-no-files-found: error

      - name: Create git tag and draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          scripts/create-draft-release.sh
          "${{ inputs.version }}"
          "${{ inputs.target_ref }}"
          "${{ steps.release-ref.outputs.sha }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.GATEWAY_IMAGE_NAME }}:${{ inputs.version }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.WORKER_IMAGE_NAME }}:${{ inputs.version }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.UI_IMAGE_NAME }}:${{ inputs.version }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.SNAPSHOTTER_IMAGE_NAME }}:${{ inputs.version }}"
          "${{ steps.build-gateway.outputs.digest }}"
          "${{ steps.build-worker.outputs.digest }}"
          "${{ steps.build-ui.outputs.digest }}"
          "${{ steps.build-snapshotter.outputs.digest }}"
          "${{ steps.attest-gateway.outputs.attestation-url }}"
          "${{ steps.attest-worker.outputs.attestation-url }}"
          "${{ steps.attest-ui.outputs.attestation-url }}"
          "${{ steps.attest-snapshotter.outputs.attestation-url }}"

      - name: Upload production Compose release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload
          "${{ inputs.version }}"
          "release/archivist-compose-${{ inputs.version }}.tar.gz"
          --clobber
