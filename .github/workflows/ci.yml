name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate build, lint, and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          global-json-file: src/gateway/global.json

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: src/worker/go.mod
          cache-dependency-path: src/worker/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: src/snapshotter/uv.lock

      - name: Restore UI dependencies
        working-directory: src/ui
        run: npm ci

      - name: Format Gateway
        working-directory: src/gateway
        run: dotnet format --verify-no-changes

      - name: Build Gateway
        working-directory: src/gateway
        run: dotnet build

      - name: Test Gateway
        working-directory: src/gateway
        run: dotnet test

      - name: Lint Worker
        working-directory: src/worker
        run: go tool golangci-lint run

      - name: Build Worker
        working-directory: src/worker
        run: go build -v ./...

      - name: Test Worker
        working-directory: src/worker
        run: go test -race -shuffle=on ./...

      - name: Lint UI
        working-directory: src/ui
        run: npm run lint

      - name: Build UI
        working-directory: src/ui
        run: npm run build

      - name: Test UI
        working-directory: src/ui
        run: npm run test

      - name: Sync Snapshotter dependencies
        working-directory: src/snapshotter
        run: uv sync --locked --all-extras --dev

      - name: Format Snapshotter
        working-directory: src/snapshotter
        run: uv run ruff format --check .

      - name: Lint Snapshotter
        working-directory: src/snapshotter
        run: uv run ruff check .

      - name: Type-check Snapshotter
        working-directory: src/snapshotter
        run: uv run ty check .

      - name: Test Snapshotter
        working-directory: src/snapshotter
        run: uv run pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build Snapshotter image
        run: >-
          docker buildx build
          --file snapshotter.Dockerfile
          --platform linux/amd64
          --load
          --tag archivist-snapshotter:test
          .

      - name: Smoke Snapshotter image
        run: >-
          docker run
          --rm
          --read-only
          --tmpfs /tmp
          --entrypoint /app/venv/bin/archivist-snapshotter
          archivist-snapshotter:test
          --help

      # TODO: enable Codecov after Gateway, Worker, and UI test commands emit coverage reports.
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
