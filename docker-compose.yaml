services:
  ingress:
    image: caddy:2.11.2
    depends_on:
      - gateway
      - ui
    volumes:
      - ./rp.Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - archivist
    restart: always

  gateway:
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DOTNET_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_ENVIRONMENT: Production
      OTEL_SERVICE_NAME: archivist-gateway
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=archivist
      OTEL_TRACES_SAMPLER: always_on
    expose:
      - "8080"
    volumes:
      - data:/data
    networks:
      - archivist
    restart: always

  worker:
    depends_on:
      - gateway
    environment:
      OTEL_SERVICE_NAME: archivist-worker
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=archivist
      OTEL_TRACES_SAMPLER: always_on
    volumes:
      - data:/data
    networks:
      - archivist
    restart: always

  snapshotter:
    depends_on:
      - gateway
      - worker
    environment:
      OTEL_SERVICE_NAME: archivist-snapshotter
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=archivist
      OTEL_TRACES_SAMPLER: always_on
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - data:/data
      - snapshotter-work:/work
    networks:
      - archivist
    restart: always

  ui:
    expose:
      - "8080"
    networks:
      - archivist
    restart: always

  otelcol:
    command:
      - --config=/etc/otelcol-config.yaml
    expose:
      - "4318"
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol-config.yaml:ro
    networks:
      - archivist
    restart: always

networks:
  archivist:

volumes:
  data:
  snapshotter-work:
